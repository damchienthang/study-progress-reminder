<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course != null ? 'Sửa môn học' : 'Thêm môn học'} + ' — StudyReminder'">Form môn học</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- ════ NAV ════ -->
    <nav id="main-nav">
        <div class="logo">📚 StudyReminder</div>
        <a th:href="@{/dashboard}" class="nav-btn">🏠 Dashboard</a>
        <a th:href="@{/courses}" class="nav-btn active">📖 Môn học</a>
        <a th:href="@{/tasks}" class="nav-btn">✅ Nhiệm vụ</a>
        <a th:href="@{/plans}" class="nav-btn">📅 Kế hoạch</a>

        <div class="nav-right">
            <a th:href="@{/reminders}" class="btn btn-secondary btn-sm" id="notif-toggle-btn"
                style="position:relative;text-decoration:none">
                🔔 Thông báo
                <span th:if="${unreadReminders != null and unreadReminders > 0}" class="badge"
                    th:text="${unreadReminders}"
                    style="background:var(--red);color:#fff;border-radius:50%;padding:1px 5px;font-size:10px;margin-left:4px">•</span>
            </a>
            <a th:href="@{/profile}" class="avatar" id="user-avatar" th:title="${session.user.fullName}"
                th:text="${#strings.substring(session.user.fullName, 0, 1)}">U</a>
        </div>
    </nav>

    <!-- ════ APP ════ -->
    <div class="app" id="main-app">

        <!-- SIDEBAR -->
        <div class="sidebar" id="main-sidebar">
            <div class="sidebar-section">Tổng quan</div>
            <a th:href="@{/dashboard}" class="sidebar-item">
                <span class="icon">🏠</span>Dashboard
            </a>

            <div class="sidebar-section">Học tập</div>
            <a th:href="@{/courses}" class="sidebar-item active">
                <span class="icon">📖</span>Môn học
            </a>
            <a th:href="@{/tasks}" class="sidebar-item">
                <span class="icon">✅</span>Nhiệm vụ
            </a>
            <a th:href="@{/plans}" class="sidebar-item">
                <span class="icon">📅</span>Kế hoạch
            </a>
            
            <div class="sidebar-section">Thông báo</div>
            <a th:href="@{/reminders}" class="sidebar-item">
                <span class="icon">🔔</span>Nhắc nhở
                <span th:if="${unreadReminders != null and unreadReminders > 0}" th:text="${unreadReminders}"
                    style="margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px">•</span>
            </a>

            <div class="sidebar-section">Tài khoản</div>
            <a th:href="@{/profile}" class="sidebar-item">
                <span class="icon">👤</span>Hồ sơ
            </a>
            <a th:href="@{/logout}" class="sidebar-item">
                <span class="icon">🚪</span>Đăng xuất
            </a>
        </div>
    <div class="main" style="max-width:520px;margin:0 auto">
        <div class="page-header">
            <h1 class="page-title" th:text="${course != null ? '✏️ Sửa môn học' : '📖 Thêm môn học mới'}">Form</h1>
        </div>
        <div class="card" style="padding:28px">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form th:action="${course != null ? '/courses/' + course.courseId + '/edit' : '/courses/new'}" method="post">
                <div class="form-group">
                    <label class="form-label" for="courseName">Tên môn học *</label>
                    <input id="courseName" name="courseName" type="text" class="form-input"
                           th:value="${course != null ? course.courseName : ''}"
                           placeholder="VD: Nhập môn Công nghệ phần mềm" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="courseCode">Mã môn học</label>
                        <input id="courseCode" name="courseCode" type="text" class="form-input"
                               th:value="${course != null ? course.courseCode : ''}"
                               placeholder="VD: INT1340">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lecturer">Giảng viên</label>
                        <input id="lecturer" name="lecturer" type="text" class="form-input"
                               th:value="${course != null ? course.lecturer : ''}"
                               placeholder="VD: Ths. Nguyễn Văn A">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="credits">Số tín chỉ</label>
                    <input id="credits" name="credits" type="number" class="form-input" min="0" max="10"
                           th:value="${course != null ? course.credits : 3}">
                </div>
                <div class="form-group">
                    <label class="form-label" for="semester">Học kỳ</label>
                    <input id="semester" name="semester" type="text" class="form-input"
                           th:value="${course != null ? course.semester : ''}"
                           placeholder="VD: HK1-2025">
                </div>
                <div style="display:flex;gap:12px;margin-top:24px">
                    <button type="submit" class="btn btn-primary" id="btn-save-course"
                            th:text="${course != null ? '💾 Lưu thay đổi' : '✅ Thêm môn học'}">Lưu</button>
                    <a th:href="@{/courses}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
