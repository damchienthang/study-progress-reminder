<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập — Study Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-header">
        <h1>📚 Study Reminder</h1>
        <p>Quản lý tiến trình học tập</p>
    </div>
    <div class="auth-body">
        <h2>Đăng nhập</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${param.registered}" class="alert alert-success">
            Đăng ký thành công! Vui lòng đăng nhập.
        </div>
        <div th:if="${param.reset}" class="alert alert-success">
            Khôi phục mật khẩu thành công! Vui lòng đăng nhập lại.
        </div>
        <div th:if="${param.deleted}" class="alert alert-success">
            Tài khoản đã được xóa vĩnh viễn khỏi hệ thống.
        </div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu">
            </div>
            <div style="text-align: right; margin-top: 5px; margin-bottom: 15px;">
                <a th:href="@{/forgot-password}" style="font-size: 14px; color: var(--primary);">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
        </form>

        <p class="auth-link">
            Chưa có tài khoản?
            <a th:href="@{/register}">Đăng ký ngay</a>
        </p>
    </div>
</div>
</body>
</html>
