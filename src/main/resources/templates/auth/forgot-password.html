<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu — Study Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-header">
        <h1>📚 Study Reminder</h1>
        <p>Khôi phục mật khẩu</p>
    </div>
    <div class="auth-body">
        <h2>Quên mật khẩu</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/forgot-password}">
            <div class="form-group">
                <label>Email đã đăng ký</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" name="newPassword" required placeholder="Nhập mật khẩu mới">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Đổi mật khẩu</button>
        </form>

        <p class="auth-link">
            Đã nhớ mật khẩu?
            <a th:href="@{/login}">Đăng nhập ngay</a>
        </p>
    </div>
</div>
</body>
</html>
