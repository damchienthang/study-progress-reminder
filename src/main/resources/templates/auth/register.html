<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — StudyReminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: radial-gradient(circle at top left, #1a2332, var(--bg));
            justify-content: center;
            align-items: center;
            display: flex;
        }
        .auth-card {
            width: 440px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }
        .auth-logo {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            color: var(--accent);
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">📚 StudyReminder</div>
        <h2 style="font-size:20px;text-align:center;margin-bottom:8px">Tạo tài khoản mới</h2>
        <p style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:32px">Bắt đầu hành trình chinh phục kiến thức của bạn</p>

        <div th:if="${error}" style="margin-bottom:20px;padding:12px;background:rgba(248,81,73,0.1);border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;text-align:center" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label class="form-label">Họ và tên</label>
                <input type="text" name="fullName" class="form-input" placeholder="Nguyễn Văn A" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="name@example.com" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Xác nhận</label>
                    <input type="password" name="confirmPassword" class="form-input" placeholder="••••••••" required>
                </div>
            </div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:24px;text-align:center">
                Bằng cách đăng ký, bạn đồng ý với các <a href="#">Điều khoản dịch vụ</a>.
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="padding:12px;font-size:14px">Đăng ký tài khoản</button>
        </form>

        <p style="text-align:center;font-size:13px;color:var(--text2);margin-top:32px">
            Đã có tài khoản? <a th:href="@{/login}" style="font-weight:700">Đăng nhập</a>
        </p>
    </div>
</body>
</html>
