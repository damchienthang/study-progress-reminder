<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký — Study Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-header">
        <h1>Study Reminder</h1>
        <p>Tạo tài khoản mới</p>
    </div>
    <div class="auth-body">
        <h2>Đăng ký</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" name="fullName" required placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu (ít nhất 6 ký tự)</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Đăng ký</button>
        </form>

        <p class="auth-link">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </p>
    </div>
</div>
</body>
</html>
