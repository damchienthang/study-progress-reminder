<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu — Study Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-header">
        <h1>Study Reminder</h1>
        <p>Bước 2: Thiết lập mật khẩu mới</p>
    </div>
    <div class="auth-body">
        <div th:if="${success}" class="alert alert-success" style="margin-bottom:20px">
            <p th:text="${success}"></p>
            <div th:if="${demoToken}" style="margin-top:10px; padding:10px; background:rgba(0,0,0,0.1); border-radius:6px; border:1px dashed var(--green)">
                <strong>Mã Demo:</strong> <code th:text="${demoToken}" style="font-size:18px; color:var(--accent)"></code>
                <br><small>(Trong thực tế mã này sẽ gửi vào email của bạn)</small>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/reset-password}">
            <div class="form-group">
                <label>Mã xác nhận (Token)</label>
                <input type="text" name="token" th:value="${token}" required placeholder="Nhập mã 8 ký tự" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" name="newPassword" required placeholder="Ít nhất 6 ký tự">
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Hoàn tất đặt lại mật khẩu</button>
        </form>

        <p class="auth-link">
            Chưa nhận được mã?
            <a th:href="@{/forgot-password}">Thử lại</a>
        </p>
    </div>
</div>
</body>
</html>
