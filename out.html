<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập — Study Reminder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-header">
        <h1>📚 Study Reminder</h1>
        <p>Quản lý tiến trình học tập</p>
    </div>
    <div class="auth-body">
        <h2>Đăng nhập</h2>

        
        
        
        

        <form method="post" action="/login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu">
            </div>
            <div style="text-align: right; margin-top: 5px; margin-bottom: 15px;">
                <a href="/forgot-password" style="font-size: 14px; color: var(--primary);">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
        </form>

        <p class="auth-link">
            Chưa có tài khoản?
            <a href="/register">Đăng ký ngay</a>
        </p>
    </div>
</div>
</body>
</html>
