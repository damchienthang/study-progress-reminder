<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ — Study Reminder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span class="navbar-brand">📚 Study Reminder</span>
    <div class="navbar-menu">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/logout}" class="btn-logout">Đăng xuất</a>
    </div>
</nav>
<div class="container">
    <h2>Hồ sơ cá nhân</h2>
    <div class="card" style="max-width:480px;margin-top:20px;">
        <p><b>Họ tên:</b> <span th:text="${session.user.fullName}"></span></p>
        <p><b>Email:</b>  <span th:text="${session.user.email}"></span></p>
        <p><b>Vai trò:</b><span th:text="${session.user.role}"></span></p>
        <hr style="margin:20px 0;">
        <h3 style="margin-bottom:16px;">Đổi mật khẩu</h3>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form method="post" th:action="@{/profile/change-password}">
            <div class="form-group">
                <label>Mật khẩu cũ</label>
                <input type="password" name="oldPassword" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" name="newPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
        </form>
    </div>
</div>
</body>
</html>
